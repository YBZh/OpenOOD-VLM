dataset:
  name: imagenet_100
  num_classes: 100
  pre_size: 256
  image_size: 224

  interpolation: bicubic # following clip.
  normalization_type: clip ## imagenet | clip.

  num_workers: '@{num_workers}'
  num_gpus: '@{num_gpus}'
  num_machines: '@{num_machines}'

  split_names: [train, val, test]

  train:
    dataset_class: ImglistDataset
    data_dir: ./data/images_largescale/
    imglist_pth: ./data/benchmark_imglist/hardood/val_imagenet_100.txt
    batch_size: 128
    few_shot: 16
    randseed: 0
    shuffle: True
  val:
    dataset_class: ImglistDataset
    data_dir: ./data/images_largescale/
    imglist_pth: ./data/benchmark_imglist/hardood/val_imagenet_100.txt
    batch_size: 256
    shuffle: False
  test:
    dataset_class: ImglistDataset
    data_dir: ./data/images_largescale/
    imglist_pth: ./data/benchmark_imglist/hardood/ood_imagenet_100.txt
    batch_size: 256
    shuffle: False

ood_dataset:
  name: imagenet_ood
  num_classes: 100

  dataset_class: ImglistDataset
  interpolation: bicubic
  normalization_type: clip
  batch_size: 256
  shuffle: False # for Test time method, shuffle is performed in the trainer, please verify.

  pre_size: 256
  image_size: 224
  num_workers: '@{num_workers}'
  num_gpus: '@{num_gpus}'
  num_machines: '@{num_machines}'
  split_names: [val, nearood, farood]
  val:
    data_dir: ./data/images_largescale/
    imglist_pth: ./data/benchmark_imglist/hardood/ood_imagenet_10.txt
  nearood:
    datasets: [imagenet_10]
    imagenet_10:
      data_dir: ./data/images_largescale/
      imglist_pth: ./data/benchmark_imglist/hardood/ood_imagenet_10.txt
  farood:
    datasets: [imagenet_10]
    imagenet_10:
      data_dir: ./data/images_largescale/
      imglist_pth: ./data/benchmark_imglist/hardood/ood_imagenet_10.txt

